replicaCount: 2

image:
  name: noseyug/applyhub-api-gateway
  tag: b68571f

container:
  port: 4000
    
configmap:
  enabled: true
  data:
    NODE_ENV: "production"
    GATEWAY_PORT: "4000"
    AUTH_URL: "http://auth-service-svc"
    JOB_URL: "http://job-service-svc"
    APPLICATION_URL: "http://application-service-svc"

service:
  type: ClusterIP
  port: 4000
    
ingress:
  enabled: true
  className: nginx
  host: applyhub.noseyug.online
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-ci"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  paths:
    - path: /api(/|$)(.*)
      pathType: ImplementationSpecific
      port: 4000

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuTargetUtilization: 70
  memoryTargetUtilization: 70

pdb:
  enabled: true
  minAvailable: 1
