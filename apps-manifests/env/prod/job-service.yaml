image:
  name: noseyug/applyhub-job-service
  tag: "v0.0.5"
container:
  port: 4002
configmap:
  enabled: true
  data:
    NODE_ENV: "production"
    JOB_PORT: "4002"
    JOB_DB_HOST: "applyhub-db.crwsegu2uf4l.ap-southeast-1.rds.amazonaws.com"
    JOB_DB_PORT: "5432"
    JOB_DB_NAME: "job_service"
externalsecret:
  enabled: true
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  refreshInterval: 1h
  remoteKey: prod/applyhub/job-service
  properties:
    - JOB_DB_USER
    - JOB_DB_PASSWORD
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuTargetUtilization: 70
  memoryTargetUtilization: 70
pdb:
  enabled: true
  minAvailable: 1
release:
  sourceTag: v0.0.5
