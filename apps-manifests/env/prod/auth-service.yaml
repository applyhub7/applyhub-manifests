image:
  name: noseyug/applyhub-auth-service
  tag: "v0.0.6"
container:
  port: 4001
configmap:
  enabled: true
  data:
    NODE_ENV: "production"
    AUTH_PORT: "4001"
    AUTH_DB_HOST: "applyhub-db.crwsegu2uf4l.ap-southeast-1.rds.amazonaws.com"
    AUTH_DB_PORT: "5432"
    AUTH_DB_NAME: "auth_service"
externalsecret:
  enabled: true
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  refreshInterval: 1h
  remoteKey: prod/applyhub/auth-service
  properties:
    - AUTH_DB_USER
    - AUTH_DB_PASSWORD
    - JWT_SECRET
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuTargetUtilization: 70
  memoryTargetUtilization: 70
pdb:
  enabled: true
  minAvailable: 1
release:
  sourceTag: v0.0.5
