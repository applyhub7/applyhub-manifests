replicaCount: 2
image:
  name: noseyug/applyhub-frontend
  tag: v0.0.2
probes:
  liveness:
    path: /
  readiness:
    path: /
ingress:
  enabled: true
  className: nginx
  host: applyhub.noseyug.online
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-ci"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  paths:
    - path: /
      pathType: ImplementationSpecific
      port: 80
pdb:
  enabled: true
  minAvailable: 1
