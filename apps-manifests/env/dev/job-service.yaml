image:
  name: noseyug/applyhub-job-service
  tag: 23a53ea
container:
  port: 4002
configmap:
  enabled: true
  data:
    NODE_ENV: "development"
    JOB_PORT: "4002"
    JOB_DB_HOST: "job-service-postgres-svc.databases.svc.cluster.local"
    JOB_DB_PORT: "5432"
    JOB_DB_NAME: "applyhub"
externalsecret:
  enabled: true
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  refreshInterval: 1h
  remoteKey: dev/applyhub/job-service
  properties:
    - JOB_DB_USER
    - JOB_DB_PASSWORD
