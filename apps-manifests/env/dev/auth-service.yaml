image:
  name: noseyug/applyhub-auth-service
  tag: "6d0c9f6"
container:
  port: 4001
configmap:
  enabled: true
  data:
    NODE_ENV: "development"
    AUTH_PORT: "4001"
    AUTH_DB_HOST: "postgres-svc.databases.svc.cluster.local"
    AUTH_DB_PORT: "5432"
    AUTH_DB_NAME: "auth_service"
externalsecret:
  enabled: true
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  refreshInterval: 1h
  remoteKey: dev/applyhub/auth-service
  properties:
    - AUTH_DB_USER
    - AUTH_DB_PASSWORD
    - JWT_SECRET
