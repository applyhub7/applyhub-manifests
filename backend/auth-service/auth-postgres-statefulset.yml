apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres-statefulset
spec:
  serviceName: "auth-postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres-statefulset
  template:
    metadata:
      labels:
        app: auth-postgres-statefulset
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: auth-configmap
                  key: AUTH_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-configmap
                  key: AUTH_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: auth-configmap
                  key: AUTH_DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: auth-postgres-pvc
