apiVersion: v1
kind: Service
metadata:
  name: minio-service
spec:
  type: ClusterIP # Biến thành Headless Service bắt buộc cho StatefulSet
  selector:
    app: minio-statefulset
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
