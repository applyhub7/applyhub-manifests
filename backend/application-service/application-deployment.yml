apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-deployment
  template:
    metadata:
      labels:
        app: application-deployment
    spec:
      containers:
        - name: backend
          image: noseyug/applyhub-application-service:dev-e11689e
          ports:
            - containerPort: 4003
          envFrom:
            - configMapRef:
                name: application-configmap
