apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: databases-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/applyhub7/applyhub-manifests'
    targetRevision: dev
    path: apps-manifests/databases
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
