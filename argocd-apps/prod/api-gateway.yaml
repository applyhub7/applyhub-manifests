apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway-prod
  namespace: argocd
spec:
  project: prod
  sources:
    - repoURL: https://github.com/applyhub7/applyhub-manifests
      targetRevision: main
      path: apps-manifests/applyhub
      helm:
        releaseName: api-gateway
        valueFiles:
          - $values/apps-manifests/env/prod/api-gateway.yaml
    - repoURL: https://github.com/applyhub7/applyhub-manifests
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
