global:
  domain: argocd.noseyug.online

server:
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

  config:
    params:
      server.insecure: true  
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-dev-ci"   
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"  
    hosts:
      - argocd.noseyug.online
    tls:
      - hosts:
          - argocd.noseyug.online

controller:                
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

repoServer:
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

redis:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
