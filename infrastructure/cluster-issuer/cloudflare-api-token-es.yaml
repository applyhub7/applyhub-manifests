apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token-es
  namespace: cert-manager 
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token-sec 
    creationPolicy: Owner
  data:
  - secretKey: api-token
    remoteRef:
      key: prod/cloudflare/token 
      property: api-token 
