apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-es
  namespace: databases
  labels:
    app: postgres
    tier: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    name: postgres-sec
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_USER
    remoteRef:
      key: dev/applyhub/database
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: dev/applyhub/database
      property: POSTGRES_PASSWORD
