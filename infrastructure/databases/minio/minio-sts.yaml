apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio-sts
  namespace: databases
  labels:
    app: minio
    tier: database
spec:
  serviceName: "minio-svc"
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          envFrom:
            - secretRef:
                name: minio-sec
          volumeMounts:
            - name: pgdata
              mountPath: /data

  volumeClaimTemplates:
   - metadata:
       name: pgdata
     spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "gp3"
        resources:
          requests:
            storage: 5Gi
