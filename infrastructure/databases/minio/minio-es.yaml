apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-es
  namespace: databases
  labels:
    app: minio
    tier: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-sm-css
    kind: ClusterSecretStore
  target:
    name: minio-sec
    creationPolicy: Owner
  data:
  - secretKey: MINIO_ROOT_USER 
    remoteRef:
      key: dev/applyhub/database
      property: MINIO_ACCESS_KEY
  - secretKey: MINIO_ROOT_PASSWORD
    remoteRef:
      key: dev/applyhub/database
      property: MINIO_SECRET_KEY

